<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- H5 移动端核心适配标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>天津仁爱学院 登记查询入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f2f3f7;
            padding: 20px 16px;
        }
        .wrap {
            max-width: 750px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 22px;
            color: #222;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .section-title {
            font-size: 16px;
            color: #666;
            margin: 20px 0 12px;
            padding-left: 8px;
            border-left: 3px solid #409eff;
        }
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 0;
            text-align: center;
            text-decoration: none;
            font-size: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }
        /* 查询类按钮样式 */
        .btn-query {
            background: #9c88ff;
            color: #fff;
        }
        .btn-query:active {
            background: #826ee8;
        }
        /* 表单类按钮样式 */
        .btn-form {
            background: #409eff;
            color: #fff;
        }
        .btn-form:active {
            background: #337ecc;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1 class="title">天津仁爱学院 登记&查询入口</h1>

        <div class="section-title">信息查询</div>
        <div class="btn-list">
            <a href="https://www.kdocs.cn/etapps/query/q/cVCeNmYw" target="_blank" class="btn btn-query">入校机动车信息登记-查询</a>
            <a href="https://www.kdocs.cn/etapps/query/q/PjpvXadi" target="_blank" class="btn btn-query">值班登记表-查询</a>
            <a href="https://www.kdocs.cn/etapps/query/q/wk17ozcb" target="_blank" class="btn btn-query">访客信息查询</a>
            <a href="https://www.kdocs.cn/etapps/query/q/4eJeICdy" target="_blank" class="btn btn-query">保卫处值班信息查询</a>
        </div>

        <div class="section-title">表单填写/打卡</div>
        <div class="btn-list">
            <a href="https://f.wps.cn/g/BzdxcGk5/" target="_blank" class="btn btn-form">天津仁爱学院值班登记表</a>
            <a href="https://f.wps.cn/g/1AbfSJ8L/" target="_blank" class="btn btn-form">保卫处办公室值班登记表</a>
            <a href="https://f.wps.cn/g/tUeIqRFt/" target="_blank" class="btn btn-form">天津仁爱学院访客信息登记表</a>
            <a href="https://f.wps.cn/g/nvLTJKBn/" target="_blank" class="btn btn-form">西门交接班登记表</a>
            <a href="https://f.wps.cn/g/48eZWuvz/" target="_blank" class="btn btn-form">南门交接班登记表</a>
            <a href="https://f.wps.cn/g/KlMe5MUw/" target="_blank" class="btn btn-form">监控室交接班登记表</a>
            <a href="https://f.wps.cn/g/6fAtQpOB/" target="_blank" class="btn btn-form">行政楼交接班登记表</a>
            <a href="https://f.wps.cn/g/R9x8HVdF/" target="_blank" class="btn btn-form">体育馆交接班登记表</a>
            <a href="https://f.wps.cn/g/ydvyXXFf/" target="_blank" class="btn btn-form">图书馆交接班登记表</a>
        </div>
    </div>
</body>
</html>
